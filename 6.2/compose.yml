services:
  nginx-6-2:
    image: dawidd288556/product-dashboard-frontend:v2
    container_name: nginx-6-2
    ports:
      - "${APP_PORT}:80"
    networks:
      - front-net
      - back-net
    depends_on:
      - backend-6-2

  backend-6-2:
    image: dawidd288556/product-dashboard-backend:v2
    container_name: backend-6-2
    environment:
      DB_HOST: db
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      REDIS_HOST: cache
    networks:
      - back-net
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - back-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      retries: 5

  cache:
    image: redis:7-alpine
    container_name: cache
    networks:
      - back-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  db-seed:
    image: postgres:16-alpine
    container_name: db-seed
    profiles:
      - tools
    networks:
      - back-net
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    command: >
      psql -h db -U ${POSTGRES_USER} -d ${POSTGRES_DB}
      -c "INSERT INTO products (name, price) VALUES ('Widget', 9.99), ('Gadget', 24.99), ('Doohickey', 4.49)"
    depends_on:
      db:
        condition: service_healthy

networks:
  front-net:
  back-net:

volumes:
  pg-data: